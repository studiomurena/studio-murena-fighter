<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Murena: Musical Fighters</title>
    <style>
        body { 
            background: #008080; margin: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; height: 100vh; overflow: hidden; 
            font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif; 
        }
        #header-bar {
            width: 100%; max-width: 800px; background: #c0c0c0; 
            border-top: 2px solid #fff; border-left: 2px solid #fff;
            border-bottom: 2px solid #000; border-right: 2px solid #000;
            padding: 8px; display: flex; justify-content: space-between;
            margin-bottom: 10px; box-sizing: border-box; font-weight: bold;
        }
        #canvas-container { 
            position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; 
            border-radius: 20px; background: #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 50px rgba(0,255,255,0.15); overflow: hidden; 
        }
        canvas { 
            width: 100%; height: 100%; display: block; 
            image-rendering: pixelated; filter: contrast(1.1) saturate(1.2); 
        }
        #canvas-container::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%);
            background-size: 100% 4px; border-radius: 20px;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.9); pointer-events: none; z-index: 2;
        }
        #controls {
            margin-top: 15px; display: flex; justify-content: center; gap: 15px;
            width: 100%; max-width: 800px; box-sizing: border-box; color: white; 
            background: #000; padding: 10px; border: 2px solid #c0c0c0; font-family: monospace;
        }
        kbd { background: #eee; color: #000; padding: 2px 6px; border-radius: 3px; border-bottom: 2px solid #999; }
    </style>
</head>
<body>

<div id="header-bar">
    <span>STUDIO MURENA: MUSICAL FIGHTERS</span>
    <span>ARCADE SYS VER 2.0 (SPRITE EDITION)</span>
</div>

<div id="canvas-container">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
</div>

<div id="controls">
    <span>Muovi: <kbd>←</kbd> <kbd>→</kbd></span>
    <span>Salta: <kbd>↑</kbd></span>
    <span>Attacca / Seleziona: <kbd>SPAZIO</kbd></span>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

// --- GESTIONE IMMAGINI E ASSET ---
const spriteData = {
    idle: { frames: 4, speed: 10 }, // speed: quanti frame del gioco prima di cambiare immagine
    walk: { frames: 6, speed: 6 },
    attack: { frames: 5, speed: 5 },
    hurt: { frames: 3, speed: 8 }
};

const charactersInfo = [
    { id: 'ferraz', name: 'FERRAZ' },
    { id: 'carma', name: 'CARMA' },
    { id: 'nan', name: 'NAN' },
    { id: 'mauri', name: 'MAURI' },
    { id: 'falcon', name: 'FALCON' }
];

const images = {};
let imagesLoaded = 0;
let totalImages = charactersInfo.length * 4;

// Caricamento Immagini
charactersInfo.forEach(char => {
    images[char.id] = {};
    ['idle', 'walk', 'attack', 'hurt'].forEach(anim => {
        let img = new Image();
        img.src = `assets/${char.id}_${anim}.png`;
        img.onload = () => imagesLoaded++;
        images[char.id][anim] = img;
    });
});

// --- VARIABILI GLOBALI ---
let state = "LOADING"; // LOADING, SELECT, FIGHT, GAMEOVER
let frameCounter = 0;
let p1Index = 0, cpuIndex = 0;
let p1, cpu;
let matchTimer = 99;
const keys = {};

window.addEventListener('keydown', e => { keys[e.code] = true; if(state === "SELECT" || state === "GAMEOVER") handleMenuInput(e.code); });
window.addEventListener('keyup', e => keys[e.code] = false);

// --- CLASSE COMBATTENTE ---
class Fighter {
    constructor(x, y, charData, isP1) {
        this.x = x; this.y = y;
        this.charId = charData.id; this.name = charData.name;
        this.isP1 = isP1;
        this.hp = 100;
        this.vx = 0; this.vy = 0;
        this.grounded = true;
        this.facingRight = isP1;
        
        // Stati animazione
        this.currentState = 'idle'; // idle, walk, attack, hurt
        this.animFrame = 0;
        this.animTimer = 0;
        this.attackHitboxActive = false;
        
        // Costanti fisiche e rendering
        this.spriteSize = 128; // La tua griglia originale
        this.drawScale = 1.8;  // Quanto farli grandi a schermo
        this.hitboxW = 40;     // Hitbox fisica stretta
        this.hitboxH = 100;
    }

    setAnimState(newState) {
        if (this.currentState !== newState) {
            this.currentState = newState;
            this.animFrame = 0;
            this.animTimer = 0;
            this.attackHitboxActive = false;
        }
    }

    update() {
        // Fisica
        this.vy += 0.8; // Gravità
        this.y += this.vy;
        this.x += this.vx;

        if (this.y >= 350 - this.hitboxH) {
            this.y = 350 - this.hitboxH;
            this.vy = 0; this.grounded = true;
        }

        // Limiti schermo
        if (this.x < 0) this.x = 0;
        if (this.x + this.hitboxW > 800) this.x = 800 - this.hitboxW;

        // Gestione Stati
        let animConf = spriteData[this.currentState];

        if (this.currentState === 'hurt') {
            this.vx = 0;
            if (this.animFrame === animConf.frames - 1 && this.animTimer >= animConf.speed) this.setAnimState('idle');
        } 
        else if (this.currentState === 'attack') {
            this.vx = 0;
            // Esegui danno solo nel frame centrale dell'animazione
            if (this.animFrame === 2 && !this.attackHitboxActive) {
                this.checkHit();
                this.attackHitboxActive = true;
            }
            if (this.animFrame === animConf.frames - 1 && this.animTimer >= animConf.speed) this.setAnimState('idle');
        } 
        else {
            // Movimento normale
            if (this.vx !== 0 && this.grounded) this.setAnimState('walk');
            else if (this.vx === 0 && this.grounded) this.setAnimState('idle');
        }

        // Avanzamento frame animazione
        this.animTimer++;
        if (this.animTimer >= animConf.speed) {
            this.animTimer = 0;
            this.animFrame++;
            // Se non è attack o hurt, l'animazione va in loop
            if (this.animFrame >= animConf.frames) {
                if (this.currentState === 'idle' || this.currentState === 'walk') {
                    this.animFrame = 0;
                } else {
                    this.animFrame = animConf.frames - 1; // Fermati all'ultimo frame
                }
            }
        }
    }

    attack() {
        if (this.currentState !== 'attack' && this.currentState !== 'hurt' && this.grounded) {
            this.setAnimState('attack');
        }
    }

    takeDamage(amount, direction) {
        if (this.currentState !== 'hurt') {
            this.hp -= amount;
            this.vy = -5; // Saltello all'indietro
            this.vx = direction * 5;
            this.setAnimState('hurt');
        }
    }

    checkHit() {
        let target = this.isP1 ? cpu : p1;
        let range = 80; // Quanto in là arriva il colpo (pixel)
        let attackX = this.facingRight ? this.x + this.hitboxW : this.x - range;
        
        // Semplice collisione AABB
        if (!(attackX > target.x + target.hitboxW || attackX + range < target.x || 
              this.y > target.y + target.hitboxH || this.y + 50 < target.y)) {
            target.takeDamage(10, this.facingRight ? 1 : -1);
        }
    }

    draw() {
        // Ombra
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath(); ctx.ellipse(this.x + this.hitboxW/2, 350, 30, 6, 0, 0, Math.PI*2); ctx.fill();

        let img = images[this.charId][this.currentState];
        if (!img) return;

        let drawW = this.spriteSize * this.drawScale;
        let drawH = this.spriteSize * this.drawScale;
        
        // Centratura dello sprite rispetto all'hitbox
        let drawX = this.x - (drawW / 2) + (this.hitboxW / 2);
        let drawY = this.y - (drawH) + this.hitboxH + 20; // +20 aggiusta i piedi a terra

        ctx.save();
        if (!this.facingRight) {
            ctx.translate(drawX + drawW, drawY);
            ctx.scale(-1, 1);
            drawX = 0; drawY = 0; // Resetta X e Y perché abbiamo traslato l'intero canvas
        }

        // LA MAGIA DEGLI SPRITE!
        ctx.drawImage(
            img, 
            this.animFrame * this.spriteSize, 0, // Punto di ritaglio su immagine X e Y
            this.spriteSize, this.spriteSize,    // Grandezza ritaglio
            drawX, drawY,                        // Posizione a schermo
            drawW, drawH                         // Grandezza a schermo
        );
        ctx.restore();

        // DEBUG: de-commenta la riga sotto per vedere i "rettangoli" fisici invisibili
        // ctx.strokeStyle="red"; ctx.strokeRect(this.x, this.y, this.hitboxW, this.hitboxH);
    }
}

// --- LOGICA MENU E LOOP ---
function handleMenuInput(code) {
    if (state === "SELECT") {
        if (code === 'ArrowRight') p1Index = (p1Index + 1) % charactersInfo.length;
        if (code === 'ArrowLeft') p1Index = (p1Index - 1 + charactersInfo.length) % charactersInfo.length;
        if (code === 'Space') {
            cpuIndex = Math.floor(Math.random() * charactersInfo.length);
            p1 = new Fighter(200, 200, charactersInfo[p1Index], true);
            cpu = new Fighter(550, 200, charactersInfo[cpuIndex], false);
            matchTimer = 99; state = "FIGHT";
        }
    } else if (state === "GAMEOVER" && code === 'Space') {
        state = "SELECT";
    }
}

function updateGame() {
    if (state === "LOADING") {
        if (imagesLoaded >= totalImages) state = "SELECT";
        return;
    }

    frameCounter++;
    if (state === "FIGHT") {
        if (frameCounter % 60 === 0 && matchTimer > 0) matchTimer--;
        if (matchTimer <= 0 || p1.hp <= 0 || cpu.hp <= 0) state = "GAMEOVER";

        // Direzione sguardi (solo se non stanno attaccando/morendo)
        if (p1.currentState !== 'attack' && p1.currentState !== 'hurt') p1.facingRight = p1.x < cpu.x;
        if (cpu.currentState !== 'attack' && cpu.currentState !== 'hurt') cpu.facingRight = cpu.x < p1.x;

        // Input Giocatore 1
        p1.vx = 0;
        if (p1.currentState !== 'hurt' && p1.currentState !== 'attack') {
            if (keys['ArrowRight']) p1.vx = 5;
            if (keys['ArrowLeft']) p1.vx = -5;
            if (keys['ArrowUp'] && p1.grounded) { p1.vy = -16; p1.grounded = false; }
            if (keys['Space']) p1.attack();
        }

        // IA CPU Base
        cpu.vx = 0;
        if (cpu.currentState !== 'hurt' && cpu.currentState !== 'attack') {
            let dist = Math.abs(p1.x - cpu.x);
            if (dist > 70) {
                cpu.vx = cpu.x > p1.x ? -3 : 3;
            } else if (Math.random() < 0.05) {
                cpu.attack();
            }
        }

        p1.update(); cpu.update();
    }
}

function drawGame() {
    // Sfondo Base (Modifica qui se vuoi aggiungere un'immagine per lo sfondo!)
    let grad = ctx.createLinearGradient(0,0,0,450);
    grad.addColorStop(0, "#1a0b2e"); grad.addColorStop(1, "#36195c");
    ctx.fillStyle = grad; ctx.fillRect(0,0,800,450);
    ctx.fillStyle = "#111"; ctx.fillRect(0, 350, 800, 100);
    ctx.strokeStyle = "#555"; ctx.lineWidth = 3; ctx.strokeRect(0, 350, 800, 1);

    if (state === "LOADING") {
        ctx.fillStyle = "#fff"; ctx.font = "30px 'Courier New'"; ctx.textAlign = "center";
        ctx.fillText(`CARICAMENTO ASSET... ${Math.floor((imagesLoaded/totalImages)*100)}%`, 400, 225);
    } 
    else if (state === "SELECT") {
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,800,450);
        ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.font = "bold 30px 'MS Sans Serif'";
        ctx.fillText("SELECT YOUR MUSICAL FIGHTER", 400, 100);

        charactersInfo.forEach((char, i) => {
            let x = 120 + i * 115;
            if (i === p1Index) { ctx.fillStyle = "#ffcc00"; ctx.fillRect(x-5, 195, 100, 100); }
            ctx.fillStyle = "#333"; ctx.fillRect(x, 200, 90, 90);
            
            // Disegna il frame "idle" come ritratto
            if (images[char.id].idle) {
                ctx.drawImage(images[char.id].idle, 0, 0, 128, 128, x-20, 180, 130, 130);
            }
            ctx.fillStyle = "#fff"; ctx.font = "14px 'MS Sans Serif'"; ctx.fillText(char.name, x+45, 320);
        });
        ctx.fillStyle = "#0ff"; ctx.fillText("Frecce per scorrere, SPAZIO per confermare", 400, 400);
    } 
    else if (state === "FIGHT" || state === "GAMEOVER") {
        p1.draw(); cpu.draw();

        // UI Vita
        ctx.fillStyle = "#f00"; ctx.fillRect(50, 30, 300, 20); ctx.fillRect(450, 30, 300, 20);
        ctx.fillStyle = "#0f0"; ctx.fillRect(50, 30, Math.max(0, p1.hp*3), 20);
        ctx.fillRect(450 + (300 - Math.max(0, cpu.hp*3)), 30, Math.max(0, cpu.hp*3), 20);
        
        ctx.fillStyle = "#fff"; ctx.font = "bold 20px 'MS Sans Serif'"; ctx.textAlign = "left";
        ctx.fillText(p1.name, 50, 20); ctx.textAlign = "right"; ctx.fillText(cpu.name, 750, 20);
        
        ctx.textAlign = "center"; ctx.font = "bold 30px 'Courier New'"; ctx.fillText(matchTimer, 400, 45);

        if (state === "GAMEOVER") {
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,800,450);
            ctx.fillStyle = "#fff"; ctx.font = "50px 'MS Sans Serif'";
            let msg = p1.hp <= 0 && cpu.hp <= 0 ? "DOUBLE K.O." : (p1.hp <= 0 ? "CPU WINS" : "YOU WIN!");
            ctx.fillText(msg, 400, 220);
            ctx.font = "20px 'Courier New'"; ctx.fillText("PREMI SPAZIO PER USCIRE", 400, 280);
        }
    }
}

function loop() { updateGame(); drawGame(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
